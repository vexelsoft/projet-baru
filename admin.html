<!DOCTYPE html><html><body>
<h2>Admin Deposit</h2><div id='list'>Loading...</div>
<script>
async function load(){
let r=await fetch('/api/deposits');
let d=await r.json();
let html='';
(d.data||[]).forEach(x=>{
html+=`<div style="border:1px solid #ddd;padding:10px;margin:10px">
Rp ${x.nominal}<br>${x.metode}<br>${x.bukti}<br>
<button onclick="acc(${x.id})">ACC</button></div>`
});
document.getElementById('list').innerHTML=html||'Tidak ada deposit';
}
async function acc(id){
let r=await fetch('/api/admin-acc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({depositId:id})});
alert((await r.json()).message);
load();
}
load();
</script></body></html>

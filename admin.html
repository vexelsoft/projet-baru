<!DOCTYPE html>
<html>
<body>

<h2>Admin Deposit</h2>

<div id="list">
Loading...
</div>

<script>

async function load(){

try{

const r=
await fetch(
'/api/deposits'
);

const d=
await r.json();

let html='';

if(
!d.data ||
d.data.length===0
){

html=
'Tidak ada deposit';

}else{

d.data.forEach(x=>{

html += `
<div style="
border:1px solid #ddd;
padding:10px;
margin:10px">

Rp ${x.nominal}<br>
${x.metode}<br>
${x.bukti}<br><br>

<button
onclick="acc(${x.id})">

ACC

</button>

</div>
`;

});

}

document
.getElementById(
'list'
)
.innerHTML=html;

}catch(err){

document
.getElementById(
'list'
)
.innerHTML=
'Error: '+err.message;

}

}

async function acc(id){

const r=
await fetch(
'/api/admin-acc',
{
method:'POST',
headers:{
'Content-Type':
'application/json'
},
body:JSON.stringify({
depositId:id
})
}
);

alert(
(await r.json())
.message
);

load();

}

load();

</script>

</body>
</html>

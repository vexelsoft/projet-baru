<!DOCTYPE html>
<html>
<body>

<h2>Deposit Pending</h2>

<div id="list"></div>

<script>

async function loadDeposit(){

const response=
await fetch('/api/deposits');

const data=
await response.json();

let html='';

data.data.forEach(item=>{

html += `

<div style="
border:1px solid #ddd;
padding:15px;
margin-bottom:10px;
">

ID: ${item.id}<br>
Nominal:
Rp ${Number(item.nominal)
.toLocaleString('id-ID')}<br>

Metode:
${item.metode}<br>

Bukti:
${item.bukti}<br><br>

<button
onclick="acc('${item.id}')">

ACC Deposit

</button>

</div>

`;

});

document.getElementById(
'list'
).innerHTML=html;

}

async function acc(id){

const response=
await fetch(
'/api/admin-acc',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
depositId:id
})
}
);

const data=
await response.json();

alert(data.message);

loadDeposit();

}

loadDeposit();

</script>

</body>
</html>

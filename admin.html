<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Admin Deposit</title>
<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}
.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}
button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2d1b18;
color:white;
}
</style>
</head>
<body>

<h2>Deposit Pending</h2>

<div id="depositList">
Memuat...
</div>

<script>

async function loadDeposit(){

const response=
await fetch('/api/deposits');

const data=
await response.json();

const wrap=
document.getElementById(
'depositList'
);

if(!data.data?.length){

wrap.innerHTML=
'Tidak ada deposit';

return;

}

wrap.innerHTML='';

data.data.forEach(item=>{

wrap.innerHTML += `

<div class="card">

💰 Rp ${Number(item.nominal)
.toLocaleString('id-ID')}
<br><br>

🏦 ${item.metode}
<br><br>

📝 ${item.bukti}
<br><br>

<button onclick="acc('${item.id}')">

ACC Deposit

</button>

</div>

`;

});

}

async function acc(id){

const response=
await fetch(
'/api/admin-acc',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
depositId:id
})
}
);

const data=
await response.json();

alert(data.message);

loadDeposit();

}

loadDeposit();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXELSOFT STORE</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body{font-family:Arial;background:#fdfbf7;margin:0}
.sidebar{width:250px;background:#3e2723;color:#fff;height:100vh;position:fixed;padding:20px}
.main{margin-left:270px;padding:20px}
.nav-link{display:block;color:#fff;text-decoration:none;padding:12px;border-radius:10px;margin-bottom:10px;background:rgba(255,255,255,.05)}
.card{background:#fff;padding:20px;border-radius:20px;box-shadow:0 10px 20px rgba(0,0,0,.08);margin-bottom:20px}
.input-box{width:100%;height:45px;margin-bottom:15px;border:1px solid #ddd;border-radius:10px;padding:10px}
.btn{width:100%;height:45px;border:none;background:#3e2723;color:#fff;border-radius:10px}
</style>
</head>
<body>

<div class="sidebar">
<h2>VEXELSOFT</h2>

<a class="nav-link">Sewa</a>
<a class="nav-link">Premium User</a>
<a class="nav-link">Paket Group</a>
<a class="nav-link">Suntik Sosmed</a>
<a class="nav-link">Pembayaran</a>
<a class="nav-link">Lokasi</a>

</div>

<div class="main">

<div class="card">
<h2>Suntik Sosmed</h2>

<select id="category" class="input-box">
<option>Pilih Kategori</option>
</select>

<select id="service" class="input-box">
<option>Pilih Layanan</option>
</select>

<div id="priceInfo" class="card">
Pilih layanan terlebih dahulu
</div>

<input type="text" id="target" class="input-box" placeholder="Masukkan link / username">

<input type="number" id="quantity" class="input-box" placeholder="Jumlah">

<button class="btn" onclick="orderSosmed()">
Order Sekarang
</button>

</div>

</div>

<script>

let allServices = [];

async function loadServices(){

    const response =
    await fetch('/api/services');

    const data =
    await response.json();

    if(!data.status){

        alert(data.msg);
        return;

    }

    allServices =
    data.services;

    const categories = [

        ...new Set(

            allServices.map(
                item => item.category
            )

        )

    ];

    const category =
    document.getElementById('category');

    categories.forEach(cat => {

        category.innerHTML += `
        <option value="${cat}">
            ${cat}
        </option>`;

    });

}

function loadCategoryServices(){

    const category =
    document.getElementById('category').value;

    const service =
    document.getElementById('service');

    service.innerHTML =
    '<option>Pilih Layanan</option>';

    const filtered =
    allServices.filter(
        item => item.category == category
    );

    filtered.forEach(item => {

        service.innerHTML += `
        <option value="${item.id}">
            ${item.name} - Rp ${item.price}
        </option>`;

    });

}

function updatePriceInfo(){

    const id =
    document.getElementById('service').value;

    const service =
    allServices.find(x => x.id == id);

    if(service){

        document.getElementById('priceInfo').innerHTML = `
        <b>${service.name}</b><br><br>
        Harga : Rp ${service.price}<br>
        Min : ${service.min}<br>
        Max : ${service.max}
        `;

    }

}

async function orderSosmed(){

    const service =
    document.getElementById('service').value;

    const target =
    document.getElementById('target').value;

    const quantity =
    document.getElementById('quantity').value;

    const response =
    await fetch('/api/order',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({
            service,
            target,
            quantity
        })

    });

    const data =
    await response.json();

    alert(JSON.stringify(data));

}

document
.getElementById('category')
.addEventListener(
    'change',
    loadCategoryServices
);

document
.getElementById('service')
.addEventListener(
    'change',
    updatePriceInfo
);

loadServices();

</script>

</body>
</html>

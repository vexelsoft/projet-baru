
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEXELSOFT STORE</title>
<style>
body{font-family:Arial;background:#fdfbf7;margin:0}
.sidebar{width:260px;background:#3e2723;height:100vh;position:fixed;padding:20px;color:#fff}
.main{margin-left:280px;padding:30px}
.nav-link{display:block;color:#fff;text-decoration:none;padding:12px;margin-bottom:10px;background:#4e342e;border-radius:10px}
.card{background:#fff;padding:20px;border-radius:20px;margin-bottom:20px;box-shadow:0 5px 20px rgba(0,0,0,.08)}
button{padding:12px 20px;border:none;border-radius:10px;background:#3e2723;color:#fff}
.category-btn{margin:5px}
</style>
</head>
<body>

<div class="sidebar">
<h2>VEXELSOFT</h2>

<a href="#" class="nav-link" onclick="showTab('sewa')">Sewa Bot</a>
<a href="#" class="nav-link" onclick="showTab('premium')">Premium User</a>
<a href="#" class="nav-link" onclick="showTab('group')">Group Premium</a>
<a href="#" class="nav-link" onclick="showTab('sosmed')">Suntik Sosmed</a>
</div>

<div class="main">

<div id="sewa">
<div class="card">
<h2>Paket Sewa Bot</h2>
<p>Paket Hemat 1 Bulan</p>
<button>Rp 10.000</button>
</div>
</div>

<div id="premium" style="display:none">
<div class="card">
<h2>Premium User</h2>
<p>Premium User 1 Bulan</p>
<button>Rp 5.000</button>
</div>
</div>

<div id="group" style="display:none">
<div class="card">
<h2>Premium Group</h2>
<p>Premium Group 1 Bulan</p>
<button>Rp 25.000</button>
</div>
</div>

<div id="sosmed" style="display:none">

<div class="card">

<h2>Suntik Sosmed</h2>

<div id="categoryButtons"></div>

<select id="service" style="width:100%;padding:12px;margin:10px 0"></select>

<div id="priceInfo" style="background:#eee;padding:15px;border-radius:10px;margin-bottom:10px">
Pilih layanan
</div>

<input type="text" id="target" placeholder="Username / Link" style="width:100%;padding:12px;margin-bottom:10px">

<input type="number" id="quantity" placeholder="Jumlah" style="width:100%;padding:12px;margin-bottom:10px">

<div id="totalPrice" style="background:#eee;padding:15px;border-radius:10px;margin-bottom:10px">
Total Pembayaran : Rp 0
</div>

<button onclick="orderSosmed()">Order Sekarang</button>

</div>
</div>

</div>

<script>

function showTab(id){

document.getElementById('sewa').style.display='none';
document.getElementById('premium').style.display='none';
document.getElementById('group').style.display='none';
document.getElementById('sosmed').style.display='none';

document.getElementById(id).style.display='block';

}

let allServices = [];
let groupedPlatforms = {};

async function loadServices(){

const response = await fetch('/api/services');
const data = await response.json();

if(!data.status) return;

allServices = data.services;

allServices.forEach(service=>{

const category = service.category.split(' ')[0];

if(!groupedPlatforms[category]){
groupedPlatforms[category] = [];
}

groupedPlatforms[category].push(service);

});

const wrap = document.getElementById('categoryButtons');

Object.keys(groupedPlatforms).forEach(platform=>{

wrap.innerHTML += `
<button class="category-btn" onclick="selectCategory('${platform}')">
${platform}
</button>`;

});

}

function selectCategory(category){

const select = document.getElementById('service');

select.innerHTML='';

groupedPlatforms[category].forEach(service=>{

select.innerHTML += `
<option value="${service.id}">
${service.name} - Rp ${service.price}
</option>`;

});

updatePriceInfo();

}

function updatePriceInfo(){

const serviceId = document.getElementById('service').value;

const service = allServices.find(x=>x.id == serviceId);

const qty = parseInt(document.getElementById('quantity').value || 0);

if(service){

document.getElementById('priceInfo').innerHTML = `
${service.name}<br>
Harga/1000 : Rp ${service.price}
`;

const total = Math.ceil((qty/1000) * service.price);

document.getElementById('totalPrice').innerHTML =
'Total Pembayaran : Rp ' + total.toLocaleString('id-ID');

}

}

document.getElementById('service').addEventListener('change', updatePriceInfo);
document.getElementById('quantity').addEventListener('input', updatePriceInfo);

async function orderSosmed(){

alert('Order berhasil');

}

loadServices();

</script>

</body>
</html>

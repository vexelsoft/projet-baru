<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEXELSOFT STORE</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="sidebar">

  <div class="logo">
    <i class="fas fa-rocket"></i>
    <span>VEXELSOFT</span>
  </div>

  <div class="menu">

    <button onclick="switchTab('bot')" class="menu-btn active" id="nav-bot">
      <i class="fas fa-robot"></i>
      Bot WhatsApp
    </button>

    <button onclick="switchTab('sosmed')" class="menu-btn" id="nav-sosmed">
      <i class="fas fa-bolt"></i>
      Suntik Sosmed
    </button>

    <button onclick="switchTab('payment')" class="menu-btn" id="nav-payment">
      <i class="fas fa-wallet"></i>
      Pembayaran
    </button>

  </div>

</div>

<div class="main">

  <div class="hero">
    <h1>VEXELSOFT STORE</h1>
    <p>
      Website layanan bot WhatsApp dan social media boosting modern.
    </p>
  </div>

  <!-- BOT -->
  <section id="bot">

    <div class="section-title">
      Paket Bot WhatsApp
    </div>

    <div class="grid">

      <div class="card">
        <img src="https://cdn.yupra.my.id/yp/nfuakqql.jpg">

        <div class="card-body">
          <h3>Premium 1 Bulan</h3>
          <p>
            Akses fitur premium bot WhatsApp selama 1 bulan.
          </p>

          <div class="price">
            Rp 10.000
          </div>

          <a href="https://wa.me/6285784085236" target="_blank" class="btn-primary">
            Order
          </a>
        </div>
      </div>

    </div>

  </section>

  <!-- SOSMED -->
  <section id="sosmed" style="display:none;">

    <div class="section-title">
      Suntik Sosmed
    </div>

    <div class="card form-card">

      <div class="form-group">
        <label>Platform</label>

        <select id="platform">
          <option value="instagram">Instagram</option>
          <option value="tiktok">TikTok</option>
          <option value="youtube">YouTube</option>
        </select>
      </div>

      <div class="form-group">
        <label>Link / Username</label>
        <input type="text" id="target" placeholder="Masukkan username atau link">
      </div>

      <div class="form-group">
        <label>Jumlah</label>
        <input type="number" id="jumlah" placeholder="1000">
      </div>

      <button onclick="orderSosmed()" class="btn-primary full-btn">
        Order Sekarang
      </button>

      <div id="result"></div>

    </div>

  </section>

  <!-- PAYMENT -->
  <section id="payment" style="display:none;">

    <div class="section-title">
      Pembayaran
    </div>

    <div class="card payment-card">

      <img src="https://cdn.yupra.my.id/yp/nk9tfpgk.jpg" class="qris">

      <div class="pay-grid">

        <div class="pay-item">
          <i class="fas fa-wallet"></i>
          <h4>DANA</h4>
          <p>083875543395</p>
        </div>

        <div class="pay-item">
          <i class="fas fa-wallet"></i>
          <h4>ShopeePay</h4>
          <p>083875543395</p>
        </div>

      </div>

    </div>

  </section>

</div>

<script src="script.js"></script>
</body>
</html>
